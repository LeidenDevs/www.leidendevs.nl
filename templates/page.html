{% extends "base.html" %}
{% block language %}{{ page.lang }}{% endblock language %}
{% block content %}
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <h2>{{ page.date }}</h2>
    {% endif %}
    <div class="markdown-content my-1">
        {{ page.content | safe }}
    </div>
{% endblock content %}
