{% extends "base.html" %}
{% block language %}{{ section.lang }}{% endblock language %}
{% block content %}
    <h1>{{ section.title }}</h1>
    <ul>
        {% for page in section.pages %}
        <li>
            <a href="{{ page.permalink }}">{{ page.title }}</a>
        </li>
        {% endfor %}
    </ul>
{% endblock content %}
